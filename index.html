<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

* {
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#ddd;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

/* main frame */

.frame{
position:relative;
width:1920px;
height:750px;
display:flex;
gap:15px;
overflow:hidden;
}

/* slides */

.slide{
width:300px;
height:750px;
background:white;
flex-shrink:0;
}

/* progressive blur overlays */

.blur-left,
.blur-right{
position:absolute;
top:0;
height:100%;
width:300px;
pointer-events:none;
backdrop-filter:blur(100px);
-webkit-backdrop-filter:blur(100px);
}

/* LEFT progressive blur */

.blur-left{
left:0;
mask-image:linear-gradient(
to right,
black 0%,
black 20%,
rgba(0,0,0,0.8) 40%,
rgba(0,0,0,0.4) 60%,
transparent 100%
);
}

/* RIGHT progressive blur */

.blur-right{
right:0;
mask-image:linear-gradient(
to left,
black 0%,
black 20%,
rgba(0,0,0,0.8) 40%,
rgba(0,0,0,0.4) 60%,
transparent 100%
);
}

</style>
</head>

<body>

<div class="frame">

<div class="slide"></div>
<div class="slide"></div>
<div class="slide"></div>
<div class="slide"></div>
<div class="slide"></div>
<div class="slide"></div>
<div class="slide"></div>

<div class="blur-left"></div>
<div class="blur-right"></div>

</div>

</body>
</html>
