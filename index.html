<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: transparent;
    overflow: hidden;
  }

  .slider-outer {
    position: relative;
    width: 100%;
    overflow: hidden;
  }

  /* Fade blur masks on left and right */
  .slider-outer::before,
  .slider-outer::after {
    content: '';
    position: absolute;
    top: 0;
    bottom: 0;
    width: 120px;
    z-index: 2;
    pointer-events: none;
  }
  .slider-outer::before {
    left: 0;
    background: linear-gradient(to right, var(--bg, #ffffff) 0%, transparent 100%);
  }
  .slider-outer::after {
    right: 0;
    background: linear-gradient(to left, var(--bg, #ffffff) 0%, transparent 100%);
  }

  .slider-track {
    display: flex;
    gap: 10px;
    width: max-content;
    animation: scroll-left 60s linear infinite;
  }

  .slider-track:hover {
    animation-play-state: paused;
  }

  @keyframes scroll-left {
    0%   { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }

  .slide {
    flex-shrink: 0;
    width: 140px;
    aspect-ratio: 2/3;
    overflow: hidden;
  }

  .slide img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    user-select: none;
    -webkit-user-drag: none;
  }
</style>
</head>
<body>

<div class="slider-outer">
  <div class="slider-track" id="track"></div>
</div>

<script>
  const fileIds = [
    "10s5DtWQ6xbRBR_AJYntkojkLI6L7DxRh",
    "16zjKYF3wb4lJpW6laUqYtDl6_jm6zo_J",
    "1C4NVsCtAEHJcyeLOi_aJ83913Zc7MW__",
    "1D7RK1Z4uGbQaXQwku1xuNtiz_jOFL2Or",
    "1DEqGNt8ZoNakDXqdnH4uAU6-SL4iK4xW",
    "1Dxm1RycbmXviAlmbyuzon8I0xLaxBQ4n",
    "1GLPux98BA9BnVTcUVFaBtf9l_rM-obIe",
    "1HWxmipHUDh1irKjr_GHCdZiC7qvPpZql",
    "1YHoR-TedVKFfT_7K8yc3Q7u-fZXkhUBA",
    "1YPEALEPlkv5h36tX9p6RcA6Hxm283-hH",
    "1aZie0eD0SOhR_cbCWaj9TwVaB9ABKrPF",

    "1doV4kVX0ijQhDxH5lnMY9Ietbue2QP9U",
    "1h_h1787c_EpilIDiflUEkmThZTM1zGq2",
    "1jiF0Hod48BNE6bUrUfa_YxOG_TEqAs-J",
    "1m1-Q2Z6K6qF-_LJD9qkgBjSp8nu_yUtE",
    "1sUsKKnjv6Z8en35MLHRdIShclaiF-NL4",
  ];

  const track = document.getElementById('track');

  // Build slides twice for seamless loop
  function buildSlides() {
    [...fileIds, ...fileIds].forEach((id, i) => {
      const slide = document.createElement('div');
      slide.className = 'slide';
      const img = document.createElement('img');
      img.src     = `https://drive.google.com/thumbnail?id=${id}&sz=w400`;
      img.alt     = `Image ${(i % fileIds.length) + 1}`;
      img.loading = i < fileIds.length ? 'eager' : 'lazy';
      slide.appendChild(img);
      track.appendChild(slide);
    });
  }

  buildSlides();

  // Match fade color to the page background automatically
  // Override --bg if your Carrd background is not white
  // e.g. document.documentElement.style.setProperty('--bg', '#0a0a0a');
</script>
</body>
</html>
