<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<style>

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: transparent;
  overflow: hidden;
}

.slider-outer {
  position: relative;
  width: 100%;
  height: 750px;
  overflow: hidden;
}

/* PROGRESSIVE BLUR OVERLAYS */

.slider-outer::before,
.slider-outer::after {
  content: '';
  position: absolute;
  top: 0;
  height: 100%;
  width: 300px;
  z-index: 3;
  pointer-events: none;

  backdrop-filter: blur(100px);
  -webkit-backdrop-filter: blur(100px);
}

/* LEFT SIDE BLUR */

.slider-outer::before {
  left: 0;

  mask-image: linear-gradient(
    to right,
    black 0%,
    rgba(0,0,0,0.9) 20%,
    rgba(0,0,0,0.6) 40%,
    rgba(0,0,0,0.3) 70%,
    transparent 100%
  );

  -webkit-mask-image: linear-gradient(
    to right,
    black 0%,
    rgba(0,0,0,0.9) 20%,
    rgba(0,0,0,0.6) 40%,
    rgba(0,0,0,0.3) 70%,
    transparent 100%
  );
}

/* RIGHT SIDE BLUR */

.slider-outer::after {
  right: 0;

  mask-image: linear-gradient(
    to left,
    black 0%,
    rgba(0,0,0,0.9) 20%,
    rgba(0,0,0,0.6) 40%,
    rgba(0,0,0,0.3) 70%,
    transparent 100%
  );

  -webkit-mask-image: linear-gradient(
    to left,
    black 0%,
    rgba(0,0,0,0.9) 20%,
    rgba(0,0,0,0.6) 40%,
    rgba(0,0,0,0.3) 70%,
    transparent 100%
  );
}

/* SLIDER TRACK */

.slider-track {
  display: flex;
  gap: 15px;
  width: max-content;
  height: 100%;
  animation: scroll-left 75s linear infinite;
}

.slider-track:hover {
  animation-play-state: paused;
}

@keyframes scroll-left {

  0% {
    transform: translateX(0);
  }

  100% {
    transform: translateX(-50%);
  }

}

/* SLIDES */

.slide {
  flex-shrink: 0;
  width: 300px;
  height: 750px;
  overflow: hidden;
}

.slide img {
  width: 300px;
  height: 750px;
  object-fit: cover;
  display: block;
  user-select: none;
  -webkit-user-drag: none;
}

</style>
</head>

<body>

<div class="slider-outer">
  <div class="slider-track" id="track"></div>
</div>

<script>

const fileIds = [

];

[...fileIds, ...fileIds].forEach((id, i) => {

});

</script>

</body>
</html>
